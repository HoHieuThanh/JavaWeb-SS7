<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>
<form>
  <label>Tên món:</label>
  <input type="text" th:value="${dish.name}"/>

  <label>Nhóm:</label>
  <select>
    <option th:each="c : ${categories}"
            th:value="${c}"
            th:text="${c}"
            th:selected="${c == dish.category}">
    </option>
  </select>
</form>

</body>
</html>
